spring:
  application:
    name: backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/kynghesat}
    username: ${SPRING_DATASOURCE_USERNAME:kynghesat}
    password: ${SPRING_DATASOURCE_PASSWORD:kynghesat}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-dev-secret-key-please-override-in-prod-min-256-bits}
    expiration-minutes: 720
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  uploads:
    dir: ${UPLOADS_DIR:uploads}
    public-base-url: ${UPLOADS_PUBLIC_BASE_URL:http://localhost:8080/uploads}
